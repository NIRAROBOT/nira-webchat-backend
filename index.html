<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NIRA Chat</title>

<style>
* { box-sizing: border-box; }
  * {
  white-space: pre-wrap;
}

html, body {
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
}

body {
  background:
radial-gradient(circle at top,
rgba(45,90,160,0.22) 0%,
rgba(10,15,28,1) 35%,
rgba(0,0,0,1) 100%);
  color: white;
font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
text-rendering: optimizeLegibility;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
  letter-spacing: -0.2px;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity: 0.10;
  z-index: 0;
  pointer-events: none;
}

#particles {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ===== CONTENEDOR ===== */
#chat-container {
  width: min(94vw, 680px);
  height: 80vh;
  max-height: 860px;

  background: linear-gradient(180deg, #FAFBFC 0%, #F1F3F6 100%);
  border-radius: 20px;

  display: flex;
  flex-direction: column;

  position: relative;
  z-index: 1;

  box-shadow: 
    0 20px 50px rgba(0,0,0,0.45),
    0 8px 20px rgba(0,0,0,0.25),
    0 0 120px rgba(80,180,255,0.12),
    inset 0 1px 0 rgba(255,255,255,0.6);

  overflow: hidden;
}

/* ===== HEADER ===== */
#header {
  display: flex;
  justify-content: space-between; /* 🔥 necesario para el logo */
  align-items: center;
  padding: 18px 20px;

  background: linear-gradient(
    135deg,
    #05070f 0%,
    #0a0f1c 60%,
    #000000 100%
  );

  border-bottom: 1px solid rgba(0, 150, 255, 0.12);
  flex-shrink: 0;
}

/* 🔥 NUEVO CONTENEDOR IZQUIERDA */
.header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}

.avatar {
  width: 54px;
  height: 54px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 0 18px rgba(0, 150, 255, 0.8);
  flex-shrink: 0;
}

.title {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: #f5f9ff;
}

/* 🔥 LOGO */
.logo {
  width: 28px;
  height: 28px;
  object-fit: contain;
  opacity: 0.9;
}

/* ===== MESSAGES ===== */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 22px;
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-height: 0;
  color: #1a1a1a;
}

#messages::-webkit-scrollbar {
  width: 6px;
}

#messages::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.2);
  border-radius: 999px;
}

.user {
  align-self: flex-end;
  max-width: 80%;
  background: linear-gradient(135deg, #2563eb, #1d9bf0);
  color: white;
  padding: 12px 16px;
  border-radius: 16px 16px 4px 16px;
  box-shadow: 0 4px 14px rgba(0, 150, 255, 0.28);
}
@keyframes messageFadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
.bot {
  align-self: flex-start;
  max-width: 88%;

background: #ffffff;
color: #111827;

 animation: messageFadeIn 0.28s ease-out;

  padding: 20px 22px;

  border-radius: 22px 22px 22px 8px;

  border: 1px solid #e5e7eb;

  font-size: 16px;
  line-height: 1.9;

  letter-spacing: 0.3px;

box-shadow:
0 8px 24px rgba(0,0,0,0.08);

  white-space: pre-wrap;
 overflow-wrap: break-word;
word-break: normal;
}

.system {
  align-self: center;
  font-size: 12px;
  color: rgba(255,255,255,0.55);
  padding: 8px 14px;
}

/* ===== INPUT ===== */
  
  #input-area {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 14px;
  border-top: 1px solid #e5e7eb;
  background: #ffffff;
}

#msg {
  flex: 1;
  min-width: 0;
  min-height: 48px;
  max-height: 180px;

  resize: none;
  overflow-y: auto;

  border-radius: 20px;
  border: 1px solid #e5e7eb;

  background: rgba(255,255,255,0.92);
  color: #1a1a1a;

  padding: 16px 18px;

  font-size: 17px;
  font-family: inherit;
  line-height: 1.5;

  outline: none;

  box-shadow:
    0 8px 24px rgba(0,0,0,0.08),
    inset 0 1px 2px rgba(255,255,255,0.5);

  transition: all 0.25s ease;
}

#msg:focus {
  outline: none;
  border: 1px solid #4da3ff;
  box-shadow:
    0 0 0 4px rgba(77,163,255,0.15),
    0 8px 24px rgba(0,0,0,0.10);
}

.voice-wave {
  width: 100%;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.25s ease;
}

.voice-wave.hidden {
  opacity: 0;
  height: 0;
  overflow: hidden;
  pointer-events: none;
}

.voice-wave span {
  width: 4px;
  height: 10px;
  border-radius: 999px;
  background: linear-gradient(180deg, #37a6ff, #7fd7ff);
  animation: voicePulse 1s ease-in-out infinite;
  box-shadow: 0 0 10px rgba(55, 166, 255, 0.65);
}

.voice-wave span:nth-child(1) { animation-delay: 0s; }
.voice-wave span:nth-child(2) { animation-delay: 0.12s; }
.voice-wave span:nth-child(3) { animation-delay: 0.24s; }
.voice-wave span:nth-child(4) { animation-delay: 0.36s; }
.voice-wave span:nth-child(5) { animation-delay: 0.48s; }

@keyframes voicePulse {
  0%, 100% {
    height: 8px;
    opacity: 0.55;
  }
  50% {
    height: 24px;
    opacity: 1;
  }
}

#msg::placeholder {
  color: #6b7280;
}

button {
  border: none;
  border-radius: 14px;
  padding: 12px 14px;
  min-height: 48px;
  color: white;
  font-weight: 700;
  cursor: pointer;
  background: linear-gradient(135deg, #005eff, #00c3ff);
  box-shadow: 0 4px 14px rgba(0, 150, 255, 0.35);
}

.mic-button {
  min-width: 48px;
  padding: 12px;
}

.mic-recording {
  background: linear-gradient(135deg, #ff3b30, #ff6a5c);
  box-shadow: 0 0 18px rgba(255, 59, 48, 0.55);
}
.input-row {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
}

.input-row #msg {
  flex: 1;
}
@media (max-width: 640px) {
  #chat-container {
    width: 94vw;
    height: 80vh;
    border-radius: 18px;
  }

  #input-area {
    gap: 6px;
    padding: 12px;
  }

  button {
    padding: 10px 12px;
  }

  .mic-button {
    min-width: 44px;
  }
}
</style>
</head>

<body>
<canvas id="particles"></canvas>

<div id="chat-container">

  <!-- 🔥 HEADER ACTUALIZADO -->
  <div id="header">
    <div class="header-left">
      <img src="nira-avatar.png" class="avatar" />
      <div class="title">NIRA AI</div>
    </div>

    <img src="nira-logo.png" class="logo" />
  </div>

  <div id="messages">
    <div class="system">Welcome to NIRA</div>
  </div>

  <div id="input-area">
   <div id="voiceWave" class="voice-wave hidden">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  </div>

   <div class="input-row">
  <textarea id="msg" placeholder="Ask NIRA something..."></textarea>
  <button id="micBtn" class="mic-button">🎤</button>
  <button id="sendBtn">➜</button>
  </div>
   
  </div>

  </div>

<script>
const input = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
const messages = document.getElementById("messages");
function autoResizeTextarea() {
  input.style.height = "48px";
  input.style.height = input.scrollHeight + "px";
}

input.addEventListener("input", autoResizeTextarea);

 function addMessage(role, text) {

  const div = document.createElement("div");
  div.className = role;

  if (role === "bot") {

    let formatted = text

    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/^# (.*)$/gm, "<br><strong style='font-size:22px'>$1</strong><br>")
    .replace(/^## (.*)$/gm, "<br><strong style='font-size:20px'>$1</strong><br>")
    .replace(/(?:^|\n)✅/g, "<br><br>✅")
    .replace(/(?:^|\n)❌/g, "<br><br>❌")
    .replace(/(?:^|\n)(🚀|🎯|🔥|💡|✨|🎵|📌)/g, "<br><br>$1")
    .replace(/\n- /g, "<br>• ")
    .replace(/\s+(?=\d+\))/g, "<br><br>")
    .replace(/\n\n/g, "<br><br>")
    .replace(/\n/g, "<br>");

    div.innerHTML = formatted;

  } else {

    div.textContent = text;

  }

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let particlesArray = [];

class Particle {
  constructor() {
    this.reset();
    this.size = Math.random() * 3.5 + 1.2;
    this.speedX = (Math.random() - 0.5) * (Math.random() * 0.4);
    this.speedY = (Math.random() - 0.5) * (Math.random() * 0.4);
    this.opacity = Math.random() * 0.5 + 0.2;
  }

  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;

    if (this.x < -10) this.x = canvas.width + 10;
    if (this.x > canvas.width + 10) this.x = -10;
    if (this.y < -10) this.y = canvas.height + 10;
    if (this.y > canvas.height + 10) this.y = -10;
  }

draw() {
  ctx.save();

  ctx.globalAlpha = this.opacity;
  ctx.shadowBlur = 8;
  ctx.shadowColor = "rgba(80, 180, 255, 0.45)";

  ctx.beginPath();
  ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(180, 220, 255, 0.75)";
  ctx.fill();

  ctx.restore();
}
}

function initParticles() {
  particlesArray = [];
  for (let i = 0; i < 90; i++) {
    particlesArray.push(new Particle());
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particlesArray.forEach(p => {
    p.update();
    p.draw();
  });
  requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();

sendBtn.addEventListener("click", send);
input.addEventListener("keydown", e => {
  if (e.key === "Enter") send();
});

async function send() {
  const text = input.value.trim();
  if (!text) return;

  addMessage("user", text);
  input.value = "";
  input.style.height = "48px";
const thinkingDiv = document.createElement("div");
    thinkingDiv.className = "bot";
    thinkingDiv.innerHTML = "✦ NIRA is thinking...";
    messages.appendChild(thinkingDiv);
    messages.scrollTop = messages.scrollHeight;
  try {
   
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: text })
    });
    
    const data = await res.json();
    thinkingDiv.remove();
    addMessage("bot", data.reply || "No response received.");
  } catch {
    addMessage("bot", "Server not responding");
  }
}

 let mediaRecorder;
let audioChunks = [];
let silenceTimer;

 function showVoiceWave() {
  const voiceWave = document.getElementById("voiceWave");
  if (voiceWave) {
    voiceWave.classList.remove("hidden");
  }
}

function hideVoiceWave() {
  const voiceWave = document.getElementById("voiceWave");
  if (voiceWave) {
    voiceWave.classList.add("hidden");
  }
}
 
async function startRecording() {

  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  const audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(stream);
  const analyser = audioContext.createAnalyser();

  source.connect(analyser);

  analyser.fftSize = 512;

  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  mediaRecorder = new MediaRecorder(stream);
  audioChunks = [];

  micBtn.textContent = "✓";
  micBtn.style.background = "#1d9bf0";
  micBtn.classList.add("mic-recording");
  showVoiceWave();

  mediaRecorder.ondataavailable = e => {
    audioChunks.push(e.data);
  };

  mediaRecorder.onstop = async () => {

micBtn.textContent = "🎙️";
micBtn.style.background = "#2563eb";
micBtn.classList.remove("mic-recording");
hideVoiceWave();
  

    const blob = new Blob(audioChunks, { type: "audio/webm" });

    const formData = new FormData();
    formData.append("audio", blob);

    const res = await fetch("/transcribe", {
      method: "POST",
      body: formData
    });
  
    const data = await res.json();

    input.value = data.text || "";
    autoResizeTextarea();
   

    stream.getTracks().forEach(t => t.stop());

    audioContext.close();
  };

  mediaRecorder.start();

}

micBtn.addEventListener("click", () => {

if (mediaRecorder && mediaRecorder.state === "recording") {

mediaRecorder.stop();

} else {

startRecording();

}

});
</script>

</body>
</html>
