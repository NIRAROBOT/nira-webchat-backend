<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIRA Chat</title>

<style>
body{
background:#f2f6fb;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

#chat-container{
 width:95vw;
max-width:700px;
height:92vh;
background:white;
color:black;
border-radius:12px;
display:flex;
flex-direction:column;
box-shadow:0 0 40px rgba(0,0,0,.2);
}
.avatar {
width:36px;
height:36px;
border-radius:50%;
object-fit:cover;
margin-right:8px;
vertical-align:middle;
}
#header{
  padding:18px;
  border-bottom:1px solid #333;
  font-size:20px;
  font-weight:600;
}

#messages{
  flex:1;
  overflow:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.user{
  background:#2563eb;
  color:white;
  padding:12px 16px;
  border-radius:10px;
  align-self:flex-end;
  max-width:70%;
}
.bot{
background:transparent;
padding:0;
border-radius:0;
max-width:100%;
color:#111;
font-size:16px;
 white-space: pre-wrap;
}

#input-area{
  display:flex;
  width:100%;
  align-items:center;
  gap:10px;
  border-top:1px solid #333;
  padding:12px;
  box-sizing:border-box;
}

#msg{
flex:1;
min-width:0;
box-sizing:border-box;
background:white;
border:1px solid #ccc;
color:black;
padding:14px;
border-radius:8px;
outline:none;
font-size:16px;
min-height:44px;
}

button{
  background:#2563eb;
  border:none;
  color:white;
  padding:12px 20px;
  margin-left:10px;
  border-radius:8px;
  cursor:pointer;
  flex-shrink:0;
  font-size:16px;
}

button:hover{
  background:#1d4ed8;
}
</style>
</head>

<body>

<div id="chat-container">

<div id="header">
<img src="nira-avatar.png" class="avatar">
NIRA AI
</div>

<div id="messages"></div>

<div id="input-area">
<input id="msg" placeholder="Ask NIRA something..." />
<!-- <button id="micBtn">🎤</button> -->
<button id="sendBtn">Send</button>
</div>

</div>

<script>

const input = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
sendBtn.addEventListener("click", send);
// Speech Recognition

// const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
// const recognition = new SpeechRecognition();

// recognition.lang = "es-ES";
// recognition.continuous = false;
// recognition.interimResults = false;

139 // micBtn.addEventListener("click", () => {
140 //     recognition.start();
141 // });

143 // recognition.onresult = function(event) {
144 //     const transcript = event.results[0][0].transcript;
145 //     input.value = transcript;
146 // };

input.addEventListener("keypress",function(e){
  if(e.key === "Enter"){
    send();
  }
});

async function send(){

  let text = input.value;

  if(!text) return;

  let messages = document.getElementById("messages");

  messages.innerHTML += `<div class="user">${text}</div>`;

  input.value = "";

  try{

    let res = await fetch(
      "https://nira-webchat-backend.onrender.com/chat",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({email:"demo@nira.com", message:text})
      }
    );

    let data = await res.json();

    messages.innerHTML += `<div class="bot">${data.reply}</div>`;

    messages.scrollTop = messages.scrollHeight;

  }catch(error){

    messages.innerHTML += `<div class="bot">Server not responding</div>`;

  }

}
 let mediaRecorder;
let audioChunks = [];

async function startRecording() {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

  mediaRecorder = new MediaRecorder(stream);

  audioChunks = [];

  mediaRecorder.ondataavailable = event => {
    audioChunks.push(event.data);
  };

  mediaRecorder.onstop = async () => {
    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
    console.log("Audio grabado:", audioBlob);
  };

  mediaRecorder.start();

  setTimeout(() => {
    mediaRecorder.stop();
  }, 4000);
}
</script>

</body>
</html>
