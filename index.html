<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIRA Chat</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at top, #0a0f1c, #000000);
      color: white;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://www.transparenttextures.com/patterns/stardust.png");
      opacity: 0.10;
      z-index: 0;
      pointer-events: none;
    }

    #particles {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #chat-container {
      width: min(94vw, 680px);
      height: 80vh;
      max-height: 860px;

      background: linear-gradient(180deg, #FAFBFC 0%, #F1F3F6 100%);
      border-radius: 20px;

      display: flex;
      flex-direction: column;

      position: relative;
      z-index: 1;

      box-shadow: 
        0 20px 50px rgba(0,0,0,0.45),
        0 8px 20px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.6);

      overflow: hidden;
    }

    /* ===== HEADER ===== */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 20px;

      background: linear-gradient(
        135deg,
        #05070f 0%,
        #0a0f1c 60%,
        #000000 100%
      );

      border-bottom: 1px solid rgba(0, 150, 255, 0.12);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 14px rgba(0, 150, 255, 0.55);
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #f5f9ff;
    }

    .logo {
      width: 28px;
      height: 28px;
      object-fit: contain;
      opacity: 0.9;
    }

    /* ===== MESSAGES ===== */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      color: #1a1a1a;
    }

    .user {
      align-self: flex-end;
      max-width: 80%;
      background: linear-gradient(135deg, #2563eb, #1d9bf0);
      color: white;
      padding: 12px 16px;
      border-radius: 16px 16px 4px 16px;
    }

    .bot {
      align-self: flex-start;
      max-width: 85%;
      background: #ffffff;
      color: #1a1a1a;
      padding: 12px 16px;
      border-radius: 16px 16px 16px 4px;
      border: 1px solid #e5e7eb;
    }

    .system {
      align-self: center;
      font-size: 13px;
      color: rgba(0,0,0,0.45);
      padding: 6px 10px;
    }

    /* ===== INPUT ===== */
    #input-area {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 14px;
      border-top: 1px solid #e5e7eb;
      background: #ffffff;
    }

    #msg {
      flex: 1;
      min-height: 48px;
      border-radius: 16px;
      border: 1px solid #e5e7eb;
      padding: 14px 16px;
      font-size: 16px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      min-height: 48px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #005eff, #00c3ff);
    }
  </style>
</head>

<body>
  <canvas id="particles"></canvas>

  <div id="chat-container">

    <!-- HEADER NUEVO -->
    <div id="header">
      <div class="header-left">
        <img src="nira-avatar.png" class="avatar" />
        <div class="title">NIRA AI</div>
      </div>

      <img src="nira-logo.png" class="logo" />
    </div>

    <div id="messages">
      <div class="system">
        Hi, I’m NIRA.  
        Your intelligent assistant for artists, creators and entrepreneurs.
      </div>
    </div>

    <div id="input-area">
      <input id="msg" placeholder="Ask NIRA anything..." />
      <button>🎤</button>
      <button>Send</button>
    </div>

  </div>
</body>
</html>
