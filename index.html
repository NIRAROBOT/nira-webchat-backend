<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIRA Chat</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at top, #0a0f1c, #000000);
      color: white;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://www.transparenttextures.com/patterns/stardust.png");
      opacity: 0.12;
      z-index: 0;
      pointer-events: none;
    }

    #particles {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    #chat-container {
      width: min(95vw, 700px);
      height: 92vh;
      max-height: 900px;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
      box-shadow: 0 0 40px rgba(0,0,0,0.25);
      overflow: hidden;
    }

    #header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      background: rgba(0, 0, 0, 0.28);
      border-bottom: 1px solid rgba(0, 150, 255, 0.20);
      flex-shrink: 0;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 22px rgba(0, 150, 255, 0.75);
      flex-shrink: 0;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f5f9ff;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }

    #messages::-webkit-scrollbar {
      width: 8px;
    }

    #messages::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
    }

    .user {
      align-self: flex-end;
      max-width: 80%;
      background: linear-gradient(135deg, #2563eb, #1d9bf0);
      color: white;
      padding: 12px 16px;
      border-radius: 16px 16px 4px 16px;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 4px 14px rgba(0, 150, 255, 0.28);
    }

    .bot {
      align-self: flex-start;
      max-width: 88%;
      background: rgba(255,255,255,0.05);
      color: #eaf3ff;
      padding: 12px 16px;
      border-radius: 16px 16px 16px 4px;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .system {
      align-self: center;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      padding: 6px 10px;
    }

    #input-area {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.20);
      flex-shrink: 0;
    }

    #msg {
      flex: 1;
      min-width: 0;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.06);
      color: white;
      padding: 14px 16px;
      outline: none;
      font-size: 16px;
    }

    #msg::placeholder {
      color: rgba(255,255,255,0.55);
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      min-height: 48px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #005eff, #00c3ff);
      box-shadow: 0 4px 14px rgba(0, 150, 255, 0.35);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    button:hover {
      filter: brightness(1.05);
    }

    button:active {
      transform: scale(0.98);
    }

    .mic-button {
      min-width: 54px;
      padding: 12px;
    }

    .mic-recording {
      background: linear-gradient(135deg, #ff3b30, #ff6a5c);
      box-shadow: 0 0 18px rgba(255, 59, 48, 0.55);
    }

    @media (max-width: 640px) {
      #chat-container {
        width: 96vw;
        height: 90vh;
        border-radius: 16px;
      }

      .title {
        font-size: 18px;
      }

      .avatar {
        width: 50px;
        height: 50px;
      }

      #input-area {
        padding: 12px;
        gap: 8px;
      }

      #msg {
        font-size: 16px;
      }

      #sendBtn {
        padding-inline: 14px;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div id="chat-container">
    <div id="header">
      <img src="nira-avatar.png" class="avatar" alt="NIRA Avatar" />
      <div class="title">NIRA AI</div>
    </div>

    <div id="messages">
      <div class="system">Welcome to NIRA</div>
    </div>

    <div id="input-area">
      <input id="msg" placeholder="Ask NIRA something..." />
      <button id="micBtn" class="mic-button" type="button">🎤</button>
      <button id="sendBtn" type="button">Send</button>
    </div>
  </div>

  <script>
    const input = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const messages = document.getElementById("messages");

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = role;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    // ===== PARTICLES =====
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    let particlesArray = [];

    class Particle {
      constructor() {
        this.reset();
        this.size = Math.random() * 2.2 + 0.6;
        this.speedX = Math.random() * 0.5 - 0.25;
        this.speedY = Math.random() * 0.5 - 0.25;
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < -10) this.x = canvas.width + 10;
        if (this.x > canvas.width + 10) this.x = -10;
        if (this.y < -10) this.y = canvas.height + 10;
        if (this.y > canvas.height + 10) this.y = -10;
      }

      draw() {
        ctx.fillStyle = "rgba(60, 160, 255, 0.8)";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particlesArray = [];
      for (let i = 0; i < 90; i++) {
        particlesArray.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
      }

      requestAnimationFrame(animateParticles);
    }

    initParticles();
    animateParticles();

    // ===== SEND MESSAGE =====
    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        send();
      }
    });

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      addMessage("user", text);
      input.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text
          })
        });

        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();
        addMessage("bot", data.reply || "No response received.");
      } catch (error) {
        console.error("Chat error:", error);
        addMessage("bot", "Server not responding");
      }
    }

    // ===== MIC WITH WHISPER =====
    let mediaRecorder;
    let audioChunks = [];

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        micBtn.textContent = "🎙️";
        micBtn.classList.add("mic-recording");

        mediaRecorder.ondataavailable = event => {
          audioChunks.push(event.data);
        };

        mediaRecorder.onstop = async () => {
          micBtn.textContent = "🎤";
          micBtn.classList.remove("mic-recording");

          const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
          const formData = new FormData();
          formData.append("audio", audioBlob, "recording.webm");

          try {
            const res = await fetch("/transcribe", {
              method: "POST",
              body: formData
            });

            if (!res.ok) {
              throw new Error("HTTP " + res.status);
            }

            const data = await res.json();
            input.value = data.text || "";

            if (input.value.trim()) {
              send();
            }
          } catch (err) {
            console.error("Transcription error:", err);
            addMessage("bot", "Transcription error");
          }

          stream.getTracks().forEach(track => track.stop());
        };

        mediaRecorder.start();

        setTimeout(() => {
          if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
          }
        }, 4000);

      } catch (err) {
        console.error("Mic error:", err);
        addMessage("bot", "Mic error");
      }
    }

    micBtn.addEventListener("click", startRecording);
  </script>
</body>
</html>
