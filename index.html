<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIRA Webchat</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #chat-container {
      width: 100%;
      max-width: 700px;
      height: 90vh;
      background: white;
      border: 1px solid #ddd;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    #chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #eee;
      font-size: 20px;
      font-weight: bold;
      background: #ffffff;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f7f7f8;
    }

    .message {
      max-width: 80%;
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user {
      margin-left: auto;
      background: #d9fdd3;
      color: #111;
    }

    .bot {
      margin-right: auto;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      color: #111;
    }

    #input-area {
      display: flex;
      gap: 8px;
      padding: 14px;
      border-top: 1px solid #eee;
      background: #fff;
    }

    #msg {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    #msg:focus {
      border-color: #999;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0 16px;
      font-size: 16px;
      cursor: pointer;
      background: #111;
      color: white;
      min-width: 54px;
      height: 46px;
    }

    button:hover {
      opacity: 0.92;
    }

    #micBtn {
      font-size: 18px;
    }

    @media (max-width: 768px) {
      body {
        height: 100dvh;
      }

      #chat-container {
        width: 100%;
        height: 100dvh;
        max-width: none;
        border-radius: 0;
      }

      #chat-header {
        font-size: 18px;
        padding: 14px 16px;
      }

      #chat {
        padding: 14px;
      }

      #input-area {
        padding: 10px;
      }

      #msg {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="chat-container">
    <div id="chat-header">NIRA</div>
    <div id="chat"></div>

    <div id="input-area">
      <input id="msg" type="text" placeholder="Ask NIRA something..." />
      <button id="micBtn" type="button">🎤</button>
      <button id="sendBtn" type="button">Send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");

    let mediaRecorder;
    let audioChunks = [];

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = `message ${sender}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      try {
        const response = await fetch("https://nira-webchat-backend.onrender.com/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email: "demo@nira.com",
            message: text
          })
        });

        const data = await response.json();
        const reply =
          data.reply ||
          data.response ||
          data.message ||
          "No response from NIRA.";

        addMessage(reply, "bot");
      } catch (error) {
        console.error("Error enviando mensaje:", error);
        addMessage("Error connecting to NIRA backend.", "bot");
      }
    }

    async function startRecording() {
      try {
        console.log("🎤 Iniciando grabación...");

        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        console.log("✅ Micrófono permitido");

        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];

        mediaRecorder.ondataavailable = (event) => {
          if (event.data && event.data.size > 0) {
            audioChunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          try {
            const audioBlob = new Blob(audioChunks, { type: "audio/webm" });
            console.log("🔥 Audio grabado:", audioBlob);

            const formData = new FormData();
            formData.append("file", audioBlob, "audio.webm");

            const response = await fetch("https://nira-webchat-backend.onrender.com/transcribe", {
              method: "POST",
              body: formData
            });

            if (!response.ok) {
              console.warn("⚠️ /transcribe no disponible todavía. Status:", response.status);
              return;
            }

            const data = await response.json();
            console.log("🧠 Texto recibido:", data.text);

            if (data.text) {
              input.value = data.text;
            }
          } catch (error) {
            console.error("❌ Error enviando audio:", error);
          }
        };

        mediaRecorder.start();
        console.log("⏺ Grabando...");

        setTimeout(() => {
          if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
            console.log("⏹ Grabación detenida");
          }

          stream.getTracks().forEach(track => track.stop());
        }, 4000);

      } catch (error) {
        console.error("❌ ERROR en micrófono:", error);
        alert("Error usando el micrófono");
      }
    }

    sendBtn.addEventListener("click", send);
    micBtn.addEventListener("click", startRecording);

    input.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        send();
      }
    });
  </script>
</body>
</html>
