<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIRA Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    .wrapper {
      max-width: 760px;
      margin: 30px auto;
      background: white;
      border: 1px solid #ddd;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    }

    .header {
      padding: 16px 20px;
      font-size: 22px;
      font-weight: bold;
      border-bottom: 1px solid #eee;
    }

    #chat {
      height: 500px;
      overflow-y: auto;
      padding: 20px;
      background: #fff;
    }

    .msg {
      margin-bottom: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.4;
      white-space: pre-wrap;
      max-width: 80%;
    }

    .user {
      background: #2563eb;
      color: white;
      margin-left: auto;
      text-align: right;
    }

    .assistant {
      background: #e5e7eb;
      color: black;
      margin-right: auto;
    }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 16px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }

    #messageInput {
      flex: 1;
      padding: 14px;
      border: 1px solid #ccc;
      border-radius: 10px;
      font-size: 16px;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">NIRA</div>

    <div id="chat"></div>

    <div class="input-row">
      <input id="messageInput" type="text" placeholder="Write your message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("messageInput");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = "msg " + sender;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      input.value = "";

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: message
          })
        });

        const data = await response.json();
        addMessage(data.reply || "No reply received.", "assistant");
      } catch (error) {
        addMessage("Error conectando con NIRA.", "assistant");
      }
    }

    input.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
