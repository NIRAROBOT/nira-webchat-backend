<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIRA Chat</title>

<style>
body {
  background: radial-gradient(circle at top, #0a0f1c, #000000);
  color: white;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
  height: 100vh;
  margin: 0;
  overflow: hidden; /* 🔥 IMPORTANTE */
}

  body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url("https://www.transparenttextures.com/patterns/stardust.png");
  opacity: 0.15;
  z-index: 0;
}
  
#chat-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 1;

  width: 95vw;
  max-width: 700px;
  height: 92vh;

  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;

  display: flex;
  flex-direction: column;
}
.avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  object-fit: cover;
  margin-right: 10px;
  box-shadow: 0 0 18px rgba(0, 150, 255, 0.8);
}

.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 18px;
  background: rgba(0, 0, 0, 0.4);
  border-bottom: 1px solid rgba(0, 150, 255, 0.2);
}

#messages{
  flex:1;
  overflow:auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.user{
  background:#2563eb;
  color:white;
  padding:12px 16px;
  border-radius:10px;
  align-self:flex-end;
  max-width:70%;
}

.bot{
  background:transparent;
  padding:0;
  border-radius:0;
  max-width:100%;
  color:#111;
  font-size:16px;
  white-space:pre-wrap;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(255,255,255,0.05);
  color: white;
  outline: none;
  font-size: 14px;
}

#msg{
  flex:1;
  min-width:0;
  box-sizing:border-box;
  background:white;
  border:1px solid #ccc;
  color:black;
  padding:14px;
  border-radius:8px;
  outline:none;
  font-size:16px;
  min-height:44px;
}

button {
  padding: 12px 16px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #005eff, #00c3ff);
  color: white;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(0, 150, 255, 0.4);
}

button:hover{
  background:#1d4ed8;
}
  .mic-button {
  padding: 12px;
  border-radius: 12px;
  background: linear-gradient(135deg, #005eff, #00c3ff);
  box-shadow: 0 4px 12px rgba(0, 150, 255, 0.4);
}
</style>
</head>

<body>
<canvas id="particles"></canvas>
<div id="chat-container">

<div id="header">
  <img src="nira-avatar.png" class="avatar">
  NIRA AI
</div>

<div id="messages"></div>

<div id="input-area">
  <input id="msg" placeholder="Ask NIRA something..." />
  <button id="micBtn" class="mic-button">🎤</button>
  <button id="sendBtn">Send</button>
</div>

</div>

<script>

const input = document.getElementById("msg");
const sendBtn = document.getElementById("sendBtn");
const micBtn = document.getElementById("micBtn");
const messages = document.getElementById("messages");
// ===== PARTICULAS =====
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particlesArray = [];

class Particle {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2;
    this.speedX = Math.random() * 0.3 - 0.15;
    this.speedY = Math.random() * 0.3 - 0.15;
  }

  update() {
    this.x += this.speedX;
    this.y += this.speedY;
  }

  draw() {
    ctx.fillStyle = "rgba(0,150,255,0.5)";
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function initParticles() {
  for (let i = 0; i < 80; i++) {
    particlesArray.push(new Particle());
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < particlesArray.length; i++) {
    particlesArray[i].update();
    particlesArray[i].draw();
  }

  requestAnimationFrame(animateParticles);
}

initParticles();
animateParticles();
// 🔥 ENVIAR MENSAJE
sendBtn.addEventListener("click", send);

input.addEventListener("keypress", function(e){
  if(e.key === "Enter"){
    send();
  }
});

async function send(){

  let text = input.value.trim();
  if(!text) return;

  messages.innerHTML += `<div class="user">${text}</div>`;
  input.value = "";
  messages.scrollTop = messages.scrollHeight;

  try{

    let res = await fetch(
      "https://chat.nirarobot.com/chat",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body: JSON.stringify({
          message:text
        })
      }
    );

    let data = await res.json();

    messages.innerHTML += `<div class="bot">${data.reply}</div>`;
    messages.scrollTop = messages.scrollHeight;

  }catch(error){
    messages.innerHTML += `<div class="bot">Server not responding</div>`;
  }
}

// 🎤 MIC FUNCIONAL CON WHISPER
let mediaRecorder;
let audioChunks = [];

async function startRecording() {

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    mediaRecorder = new MediaRecorder(stream);
    audioChunks = [];

    micBtn.innerText = "🎙️";

    mediaRecorder.ondataavailable = event => {
      audioChunks.push(event.data);
    };

    mediaRecorder.onstop = async () => {

      micBtn.innerText = "🎤";

      const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });

      const formData = new FormData();
      formData.append("audio", audioBlob, "recording.webm");

      try {

        const res = await fetch(
          "https://nira-webchat-backend.onrender.com/transcribe",
          {
            method: "POST",
            body: formData
          }
        );

        const data = await res.json();

        input.value = data.text;

        // 🔥 auto enviar
        send();

      } catch (err) {
        console.log("Transcription error:", err);
      }
    };

    mediaRecorder.start();

    setTimeout(() => {
      mediaRecorder.stop();
    }, 4000);

  } catch (err) {
    console.log("Mic error:", err);
  }
}

micBtn.addEventListener("click", startRecording);

</script>

</body>
</html>
