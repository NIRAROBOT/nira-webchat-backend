<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NIRA Chat</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at top, #0a0f1c, #000000);
      color: white;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url("https://www.transparenttextures.com/patterns/stardust.png");
      opacity: 0.10;
      z-index: 0;
      pointer-events: none;
    }

    #particles {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== NUEVO CONTENEDOR PREMIUM ===== */
    #chat-container {
      width: min(94vw, 680px);
      height: 80vh;
      max-height: 860px;

      background: linear-gradient(
        180deg,
        #F9FAFB 0%,
        #F3F4F6 100%
      );

      border-radius: 24px;

      display: flex;
      flex-direction: column;

      position: relative;
      z-index: 1;

      box-shadow: 
        0 40px 100px rgba(0,0,0,0.65),
        0 10px 30px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.6);

      overflow: hidden;
    }

    /* ===== HEADER ===== */
    #header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      background: linear-gradient(135deg, #05070f, #000000);
      border-bottom: 1px solid rgba(0, 150, 255, 0.15);
      flex-shrink: 0;
    }

    .avatar {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      object-fit: cover;
      box-shadow: 0 0 22px rgba(0, 150, 255, 0.9);
      flex-shrink: 0;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #f5f9ff;
    }

    /* ===== MESSAGES ===== */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
      color: #1a1a1a;
    }

    #messages::-webkit-scrollbar {
      width: 6px;
    }

    #messages::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.2);
      border-radius: 999px;
    }

    .user {
      align-self: flex-end;
      max-width: 80%;
      background: linear-gradient(135deg, #2563eb, #1d9bf0);
      color: white;
      padding: 12px 16px;
      border-radius: 18px 18px 6px 18px;
      box-shadow: 0 6px 18px rgba(0, 150, 255, 0.35);
    }

    .bot {
      align-self: flex-start;
      max-width: 85%;
      background: #ffffff;
      color: #1a1a1a;
      padding: 12px 16px;
      border-radius: 18px 18px 18px 6px;
      border: 1px solid #e5e7eb;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .system {
      align-self: center;
      font-size: 13px;
      color: rgba(0,0,0,0.45);
      padding: 6px 10px;
    }

    /* ===== INPUT ===== */
    #input-area {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 16px;
      border-top: 1px solid #e5e7eb;
      background: #ffffff;
    }

    #msg {
      flex: 1;
      min-height: 48px;
      border-radius: 18px;
      border: 1px solid #e5e7eb;
      background: #ffffff;
      color: #1a1a1a;
      padding: 14px 16px;
      font-size: 16px;
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.06);
    }

    #msg::placeholder {
      color: #6b7280;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      min-height: 48px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, #005eff, #00c3ff);
      box-shadow: 0 6px 18px rgba(0, 150, 255, 0.45);
      transition: all 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:active {
      transform: scale(0.97);
    }

    .mic-button {
      min-width: 54px;
    }

    .mic-recording {
      background: linear-gradient(135deg, #ff3b30, #ff6a5c);
      box-shadow: 0 0 20px rgba(255, 59, 48, 0.65);
    }

    /* ===== MOBILE ===== */
    @media (max-width: 640px) {
      #chat-container {
        width: 94vw;
        height: 78vh;
        border-radius: 22px;
      }

      .avatar {
        width: 48px;
        height: 48px;
      }

      .title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div id="chat-container">
    <div id="header">
      <img src="nira-avatar.png" class="avatar" />
      <div class="title">NIRA AI</div>
    </div>

    <div id="messages">
      <div class="system">Welcome to NIRA</div>
    </div>

    <div id="input-area">
      <input id="msg" placeholder="Ask NIRA something..." />
      <button id="micBtn" class="mic-button">🎤</button>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const input = document.getElementById("msg");
    const sendBtn = document.getElementById("sendBtn");
    const micBtn = document.getElementById("micBtn");
    const messages = document.getElementById("messages");

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = role;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    let particlesArray = [];

    class Particle {
      constructor() {
        this.reset();
        this.size = Math.random() * 2 + 0.5;
        this.speedX = Math.random() * 0.4 - 0.2;
        this.speedY = Math.random() * 0.4 - 0.2;
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        if (this.x < -10) this.x = canvas.width + 10;
        if (this.x > canvas.width + 10) this.x = -10;
        if (this.y < -10) this.y = canvas.height + 10;
        if (this.y > canvas.height + 10) this.y = -10;
      }

      draw() {
        ctx.fillStyle = "rgba(60,160,255,0.5)";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function initParticles() {
      particlesArray = [];
      for (let i = 0; i < 60; i++) {
        particlesArray.push(new Particle());
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particlesArray.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }

    initParticles();
    animateParticles();

    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") send();
    });

    async function send() {
      const text = input.value.trim();
      if (!text) return;

      addMessage("user", text);
      input.value = "";

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        const data = await res.json();
        addMessage("bot", data.reply || "No response received.");
      } catch {
        addMessage("bot", "Server not responding");
      }
    }

    let mediaRecorder;
    let audioChunks = [];

    async function startRecording() {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      micBtn.textContent = "🎙️";
      micBtn.classList.add("mic-recording");

      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);

      mediaRecorder.onstop = async () => {
        micBtn.textContent = "🎤";
        micBtn.classList.remove("mic-recording");

        const blob = new Blob(audioChunks, { type: "audio/webm" });
        const formData = new FormData();
        formData.append("audio", blob);

        const res = await fetch("/transcribe", {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        input.value = data.text || "";

        if (input.value.trim()) send();

        stream.getTracks().forEach(t => t.stop());
      };

      mediaRecorder.start();

      setTimeout(() => {
        if (mediaRecorder.state !== "inactive") mediaRecorder.stop();
      }, 4000);
    }

    micBtn.addEventListener("click", startRecording);
  </script>
</body>
</html>
